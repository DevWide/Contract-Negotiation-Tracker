<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1e40af"/>
  
  <!-- Scale balance icon -->
  <g stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Center pole -->
    <line x1="16" y1="7" x2="16" y2="25"/>
    <!-- Base -->
    <line x1="11" y1="25" x2="21" y2="25"/>
    <!-- Balance beam -->
    <line x1="6" y1="11" x2="26" y2="11"/>
    <!-- Left pan strings -->
    <line x1="8" y1="11" x2="8" y2="16"/>
    <!-- Right pan strings -->
    <line x1="24" y1="11" x2="24" y2="16"/>
    <!-- Left pan (bowl shape) -->
    <path d="M5 16C5 16 6.5 19 8 19C9.5 19 11 16 11 16"/>
    <!-- Right pan (bowl shape) -->
    <path d="M21 16C21 16 22.5 19 24 19C25.5 19 27 16 27 16"/>
    <!-- Pivot point -->
    <circle cx="16" cy="10" r="2" fill="#ffffff"/>
  </g>
</svg>
