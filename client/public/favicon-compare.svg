<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1e40af"/>
  
  <!-- Left document -->
  <rect x="5" y="6" width="9" height="12" rx="1.5" fill="#ffffff" opacity="0.9"/>
  <line x1="7" y1="9" x2="12" y2="9" stroke="#1e40af" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="7" y1="11.5" x2="11" y2="11.5" stroke="#1e40af" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="7" y1="14" x2="12" y2="14" stroke="#1e40af" stroke-width="1.2" stroke-linecap="round"/>
  
  <!-- Right document -->
  <rect x="18" y="6" width="9" height="12" rx="1.5" fill="#ffffff" opacity="0.9"/>
  <line x1="20" y1="9" x2="25" y2="9" stroke="#1e40af" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20" y1="11.5" x2="24" y2="11.5" stroke="#1e40af" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20" y1="14" x2="25" y2="14" stroke="#1e40af" stroke-width="1.2" stroke-linecap="round"/>
  
  <!-- Bidirectional arrows between documents -->
  <path d="M14.5 10L17.5 10" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M16.5 8.5L17.5 10L16.5 11.5" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M15.5 8.5L14.5 10L15.5 11.5" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Checkmark at bottom -->
  <circle cx="16" cy="23" r="5" fill="#22c55e"/>
  <path d="M13.5 23L15.2 24.7L18.5 21.3" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
